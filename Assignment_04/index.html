<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 4 </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            padding:0;
            margin: 0;
            box-sizing: border-box;
            font-family:'Roboto',sans-serif;
        }

        body{
            background-color: rgb(128, 128, 128);
        }

        .topcontainer{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .utilitybar{
            display: flex;
            align-items: center;
            background-color: hsl(0, 0%, 70%);
            height: 5rem;
            width: 50%;
            border-radius: 0.5rem;
            margin: 1rem auto;
            padding: 0 10px;
        }

        .appname{
            color: white;
            margin-right: 1rem;
            font-family: 'Times New Roman';
        }

        .appname h5,
        .appname h6 {
            font-weight: bold;
            margin: 0;
        }

        .icongroup {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .actionicons img{
            height: 30px;
            width: 30px;
            margin-right:1rem;
            cursor: pointer;
        }

        .sideicons {
            margin-left: auto;
        }

        .sideicons img{
            height: 30px;
            width: 30px;
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .sideicons button{
            background-color: rgb(15, 171, 243);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
        }

        
        .note{
            margin-top: 2rem;
            border: whitesmoke solid 0.5rem;
            border-radius: 0.25rem;
            height: 17rem;
            width: 14rem;
            position: relative;
            background-color: #f0f0f0;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .note-pin {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
        }

        .note-cancel {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 20px;
            cursor: pointer;
        }

        .note textarea{
            position: absolute;
            top: 4rem;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 10rem;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
        }

        .note h2{
            margin-top: 1rem;
            padding: 0.5rem;
            font-size: medium;
        }

        /* Hover effect */
        .note:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

    </style>
</head>

<body>

<div class="container topcontainer">

    <!-- Utility Bar -->
    <div class="utilitybar">

        <div class="appname">
            <h5>HTML5Sticky</h5>
            <h6>sticky notes for web</h6>

            </div>

            <div class="sideicons">

    </div>

    <!-- Notes Grid -->
    <div class="container text-center">
